<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 480" width="860" height="480">
<defs>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&amp;display=swap');

    .bg       { fill: #0a0e1a; }
    .panel    { fill: #0d1425; stroke: #0ea5e9; stroke-width: 1.5; }
    .panel2   { fill: #0d1425; stroke: #7c3aed; stroke-width: 1; }
    .hdr      { fill: #0ea5e9; font-family: 'Courier New', monospace; font-size: 10px; font-weight: bold; letter-spacing: 2px; }
    .lbl      { fill: #64748b; font-family: 'Courier New', monospace; font-size: 10px; }
    .val      { fill: #e2e8f0; font-family: 'Courier New', monospace; font-size: 11px; font-weight: bold; }
    .grn      { fill: #10b981; font-family: 'Courier New', monospace; font-size: 10px; }
    .pnk      { fill: #ec4899; font-family: 'Courier New', monospace; font-size: 10px; }
    .yel      { fill: #f59e0b; font-family: 'Courier New', monospace; font-size: 10px; }
    .cyn      { fill: #06b6d4; font-family: 'Courier New', monospace; font-size: 10px; }
    .title    { fill: #ffffff; font-family: 'Courier New', monospace; font-size: 16px; font-weight: bold; letter-spacing: 4px; }
    .subtitle { fill: #94a3b8; font-family: 'Courier New', monospace; font-size: 9px; letter-spacing: 2px; }
    .mottoT   { fill: #e2e8f0; font-family: 'Courier New', monospace; font-size: 10px; font-style: italic; }

    /* bar tracks */
    .btrack { fill: #1e293b; rx: 3; }

    /* animated bars */
    .bar-py  { fill: #3b82f6; animation: grow-py  1.4s 0.3s ease-out both; }
    .bar-pbi { fill: #f59e0b; animation: grow-pbi 1.4s 0.5s ease-out both; }
    .bar-sql { fill: #10b981; animation: grow-sql 1.4s 0.7s ease-out both; }
    .bar-ml  { fill: #8b5cf6; animation: grow-ml  1.4s 0.9s ease-out both; }
    .bar-eda { fill: #ec4899; animation: grow-eda 1.4s 1.1s ease-out both; }
    .bar-k   { fill: #06b6d4; animation: grow-k   1.4s 1.3s ease-out both; }

    @keyframes grow-py  { from { width: 0; } to { width: 186px; } }
    @keyframes grow-pbi { from { width: 0; } to { width: 198px; } }
    @keyframes grow-sql { from { width: 0; } to { width: 175px; } }
    @keyframes grow-ml  { from { width: 0; } to { width: 162px; } }
    @keyframes grow-eda { from { width: 0; } to { width: 198px; } }
    @keyframes grow-k   { from { width: 0; } to { width: 140px; } }

    /* blinking cursor */
    .cur  { animation: blink 1s step-end infinite; fill: #0ea5e9; }
    @keyframes blink { 50% { opacity: 0; } }

    /* pulsing status dots */
    .dot1 { fill: #10b981; animation: pulse 2s 0s ease-in-out infinite; }
    .dot2 { fill: #10b981; animation: pulse 2s 0.4s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

    /* corner decorations fade in */
    .fade { animation: fadein 0.8s 0.1s ease-out both; }
    @keyframes fadein { from { opacity:0; } to { opacity:1; } }

    /* achievement badges pop in */
    .ach1 { opacity:0; animation: pop 0.3s 1.8s forwards; }
    .ach2 { opacity:0; animation: pop 0.3s 2.0s forwards; }
    .ach3 { opacity:0; animation: pop 0.3s 2.2s forwards; }
    .ach4 { opacity:0; animation: pop 0.3s 2.4s forwards; }
    .ach5 { opacity:0; animation: pop 0.3s 2.6s forwards; }
    .ach6 { opacity:0; animation: pop 0.3s 2.8s forwards; }
    @keyframes pop { to { opacity:1; } }

    /* scanline */
    .scan { fill: url(#scanpat); opacity: 0.04; }
  </style>

  <pattern id="scanpat" width="1" height="3" patternUnits="userSpaceOnUse">
    <rect width="1" height="1" fill="#fff"/>
  </pattern>
  <pattern id="gridpat" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M40 0 L0 0 0 40" fill="none" stroke="#0ea5e9" stroke-width="0.3" opacity="0.15"/>
  </pattern>
</defs>

<!-- BG -->
<rect width="860" height="480" class="bg"/>
<rect width="860" height="480" fill="url(#gridpat)"/>
<rect width="860" height="480" class="scan"/>

<!-- outer border -->
<rect x="8" y="8" width="844" height="464" rx="6" fill="none" stroke="#0ea5e9" stroke-width="1" opacity="0.4" class="fade"/>
<rect x="12" y="12" width="836" height="456" rx="4" fill="none" stroke="#0ea5e9" stroke-width="0.5" opacity="0.2" class="fade"/>

<!-- corner brackets -->
<g stroke="#0ea5e9" stroke-width="2" fill="none" class="fade">
  <path d="M18,30 L18,18 L30,18"/>
  <path d="M842,30 L842,18 L830,18"/>
  <path d="M18,450 L18,462 L30,462"/>
  <path d="M842,450 L842,462 L830,462"/>
</g>
<g stroke="#ec4899" stroke-width="1" fill="none" opacity="0.6" class="fade">
  <path d="M22,34 L22,22 L34,22"/>
  <path d="M838,34 L838,22 L826,22"/>
  <path d="M22,446 L22,458 L34,458"/>
  <path d="M838,446 L838,458 L826,458"/>
</g>

<!-- top accent bar -->
<rect x="8" y="8" width="844" height="3" rx="1" fill="url(#accGrad)" class="fade"/>
<defs>
  <linearGradient id="accGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%"   stop-color="#0ea5e9"/>
    <stop offset="50%"  stop-color="#7c3aed"/>
    <stop offset="100%" stop-color="#ec4899"/>
  </linearGradient>
</defs>

