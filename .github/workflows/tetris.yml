name: Generate Tetris Contribution GIF

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests Pillow

      - name: Clone Tetris maker
        run: git clone https://github.com/debba/gh-contributions-tetris-gif-maker.git tetris-maker

      - name: Install Tetris requirements
        run: |
          cd tetris-maker
          pip install -r requirements.txt

      - name: Generate Tetris GIF
        run: |
          cd tetris-maker
          python main.py -u PrasanthKumarS777 -y 2026
          ls -la images/
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy GIF to root
        run: cp tetris-maker/images/*.gif ./github_tetris.gif

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add github_tetris.gif
          git diff --staged --quiet || git commit -m "🎮 Update Tetris GIF"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
