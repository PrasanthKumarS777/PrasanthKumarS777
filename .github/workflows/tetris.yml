name: Generate Tetris Contribution GIF

on:
  push:
    branches:
      - main          # ✅ triggers INSTANTLY on every commit you push
  schedule:
    - cron: "0 */6 * * *"   # ✅ backup refresh every 6 hours
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests Pillow

      - name: Clone Tetris maker
        run: git clone https://github.com/debba/gh-contributions-tetris-gif-maker.git tetris-maker

      - name: Install Tetris requirements
        run: |
          cd tetris-maker
          pip install -r requirements.txt

      - name: Generate Tetris GIF
        run: |
          cd tetris-maker
          python main.py -u PrasanthKumarS777 -y 2026
          ls -la images/
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Make GIF loop infinitely
        run: |
          python3 - <<'EOF'
          from PIL import Image
          import os

          gif_path = next(
              f"tetris-maker/images/{f}"
              for f in os.listdir("tetris-maker/images")
              if f.endswith(".gif")
          )
          img = Image.open(gif_path)
          frames = []
          durations = []
          try:
              while True:
                  frames.append(img.copy())
                  durations.append(img.info.get('duration', 100))
                  img.seek(img.tell() + 1)
          except EOFError:
              pass

          frames[0].save(
              "./github_tetris.gif",
              save_all=True,
              append_images=frames[1:],
              loop=0,           # ✅ 0 = infinite — resets and replays forever
              duration=durations,
              optimize=False
          )
          print(f"✅ Infinite loop GIF saved — {len(frames)} frames")
          EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add github_tetris.gif
          git diff --staged --quiet || git commit -m "🎮 Tetris GIF updated with latest contributions"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
