name: Generate Tetris Contribution GIF

on:
  schedule:
    - cron: "0 0 * * *"   # runs every day at midnight UTC
  workflow_dispatch:       # allows manual trigger too

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Clone Tetris GIF Maker
        run: git clone https://github.com/debba/gh-contributions-tetris-gif-maker.git

      - name: Install dependencies
        run: |
          cd gh-contributions-tetris-gif-maker
          pip install -r requirements.txt

      - name: Generate Tetris GIF
        run: |
          cd gh-contributions-tetris-gif-maker
          python main.py -u PrasanthKumarS777 -y 2026
          cp images/github_tetris.gif ../github_tetris.gif

      - name: Commit and push GIF
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add github_tetris.gif
          git commit -m "🎮 Update Tetris contribution GIF" || echo "No changes"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
