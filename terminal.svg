    <text x="130" y="176" font-family="Courier New, monospace" font-size="13" fill="#e6edf3"> Feature engineering pipeline</text>
    <text x="380" y="176" font-family="Courier New, monospace" font-size="13" fill="#484f58">  ...............</text>
    <text x="515" y="176" font-family="Courier New, monospace" font-size="13" fill="#3fb950">  434 features</text>
  </g>
