    <text x="130" y="232" font-family="Courier New, monospace" font-size="13" fill="#e6edf3"> Holdout evaluation </text>
    <text x="305" y="232" font-family="Courier New, monospace" font-size="13" fill="#484f58">  .........</text>
    <text x="388" y="232" font-family="Courier New, monospace" font-size="13" fill="#f778ba">  ROC-AUC: 0.8983</text>
    <text x="528" y="232" font-family="Courier New, monospace" font-size="13" fill="#3fb950">  P:0.84</text>
  </g>
  <g class="l7">
