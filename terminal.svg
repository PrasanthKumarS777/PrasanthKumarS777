    <text x="20" y="204" font-family="Courier New, monospace" font-size="13" fill="#d29922">  [TRAIN]  </text>
    <text x="130" y="204" font-family="Courier New, monospace" font-size="13" fill="#e6edf3"> XGBClassifier().fit(X_train, y_train)</text>
