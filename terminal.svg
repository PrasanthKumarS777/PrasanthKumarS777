<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <defs>
    <style>
      .tb  { fill: #0d1117; }
      .tbar{ fill: #161b22; }
      .mono{ font-family: 'Courier New', Courier, monospace; font-size: 13px; }
      .dim { fill: #484f58; }
      .wht { fill: #e6edf3; }
      .grn { fill: #3fb950; }
      .blu { fill: #58a6ff; }
      .yel { fill: #d29922; }
      .pnk { fill: #f778ba; }
      .cyn { fill: #39d3c3; }
      .cursor { fill: #3fb950; }
      .l0  { opacity:0; animation: pop .05s  0.2s  forwards; }
      .l1  { opacity:0; animation: pop .05s  0.9s  forwards; }
      .l2  { opacity:0; animation: pop .05s  1.7s  forwards; }
      .l3  { opacity:0; animation: pop .05s  2.5s  forwards; }
      .l4  { opacity:0; animation: pop .05s  3.3s  forwards; }
      .l5  { opacity:0; animation: pop .05s  4.1s  forwards; }
      .l6  { opacity:0; animation: pop .05s  4.9s  forwards; }
      .l7  { opacity:0; animation: pop .05s  5.7s  forwards; }
      .l8  { opacity:0; animation: pop .05s  6.5s  forwards; }
      .l9  { opacity:0; animation: pop .05s  7.3s  forwards; }
      .l10 { opacity:0; animation: pop .05s  8.1s  forwards; }
      .l11 { opacity:0; animation: pop .05s  8.9s  forwards; }
      .cur { opacity:0; animation: pop .05s  9.2s  forwards; }
      .blk { animation: blink 1s step-end infinite; }
      @keyframes pop  { to { opacity: 1; } }
      @keyframes blink{ 50% { opacity: 0; } }
    </style>
    <pattern id="scan" width="1" height="4" patternUnits="userSpaceOnUse">
      <rect width="1" height="1" y="0" fill="#000" opacity="0.07"/>
    </pattern>
  </defs>
  <rect width="800" height="420" rx="10" class="tb"/>
  <rect width="800" height="420" rx="10" fill="url(#scan)"/>
  <rect width="800" height="38" rx="10" class="tbar"/>
  <rect y="28" width="800" height="10" class="tbar"/>
  <circle cx="22" cy="19" r="7" fill="#ff5f57"/>
  <circle cx="45" cy="19" r="7" fill="#febc2e"/>
  <circle cx="68" cy="19" r="7" fill="#28c840"/>
  <text x="400" y="24" font-family="Courier New, monospace" font-size="12" fill="#484f58" text-anchor="middle">prasanth@data-lab:~/fraud-detection-pipeline</text>
