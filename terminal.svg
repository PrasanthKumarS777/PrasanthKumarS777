  <g class="l11">
    <text x="20" y="368" font-family="Courier New, monospace" font-size="13" font-weight="bold" fill="#3fb950"> PIPELINE COMPLETE</text>
    <text x="185" y="368" font-family="Courier New, monospace" font-size="13" fill="#e6edf3"> -- production-grade | MLflow | Grafana | 0.8983 ROC-AUC</text>
