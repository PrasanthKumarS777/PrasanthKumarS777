    <text x="130" y="260" font-family="Courier New, monospace" font-size="13" fill="#e6edf3"> FastAPI endpoint starting</text>
    <text x="345" y="260" font-family="Courier New, monospace" font-size="13" fill="#484f58">  ............</text>
    <text x="462" y="260" font-family="Courier New, monospace" font-size="13" fill="#3fb950">  :8000 LIVE</text>
  </g>
  <g class="l8">
    <text x="20" y="288" font-family="Courier New, monospace" font-size="13" fill="#58a6ff">  [KAFKA]  </text>
    <text x="130" y="288" font-family="Courier New, monospace" font-size="13" fill="#e6edf3"> Stream consumer active</text>
    <text x="320" y="288" font-family="Courier New, monospace" font-size="13" fill="#484f58">  .................</text>
    <text x="462" y="288" font-family="Courier New, monospace" font-size="13" fill="#3fb950">  1,000+ tx/s</text>
  </g>
  <g class="l9">
    <text x="20" y="316" font-family="Courier New, monospace" font-size="13" fill="#f778ba">  [DETECT] </text>
    <text x="130" y="316" font-family="Courier New, monospace" font-size="13" fill="#e6edf3"> Real-time fraud scoring</text>
    <text x="330" y="316" font-family="Courier New, monospace" font-size="13" fill="#484f58">  ................</text>
    <text x="462" y="316" font-family="Courier New, monospace" font-size="13" fill="#f778ba">  FRAUD: 247ms</text>
  </g>
